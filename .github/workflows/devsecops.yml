name: DevSecOps Pipeline
on:
    push:
        branches: [main]
permissions:
    contents: read
jobs:
    gitleaks:
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - name: Run Gitleaks
              uses: gitleaks/gitleaks-action@v2

    semgrep:
        runs-on: ubuntu-latest
        needs: gitleaks
        steps:
            - uses: actions/checkout@v4
            - name: Install Semgrep
              run: pip install semgrep
            - name: Run Semgrep
              run: semgrep scan --config=auto .

    trivy-fs:
        runs-on: ubuntu-latest
        needs: semgrep
        steps:
            - uses: actions/checkout@v4
            - name: Run Trivy Filesystem Scan
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  scan-type: fs
                  scan-ref: .
                  severity: HIGH,CRITICAL
                  exit-code: 1

    docker-build:
        runs-on: ubuntu-latest
        needs: trivy-fs
        steps:
            - uses: actions/checkout@v4
            - name: Build Image
              run: docker build -t devsecops-lab .
    trivy-image:
        runs-on: ubuntu-latest
        needs: docker-build
        steps:
            - uses: actions/checkout@v4
            - name: Build Image
              run: docker build -t devsecops-lab .
            - name: Scan Image
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                  image-ref: devsecops-lab
                  severity: CRITICAL,HIGH
                  exit-code: 0
